<?xml version="1.0" encoding="UTF-8"?>
<!--
  Neutral photo placeholder. Used in the template when no real media
  bytes are available (e.g. a preview render before /api/media/raw
  has been fetched, or when the operator is drafting before guardian
  consent is attested). Production renders replace these with real
  photos fetched from /api/media/raw/:uuid.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Photo placeholder">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfe8dc"/>
      <stop offset="100%" stop-color="#a7d6bf"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e8a5a"/>
      <stop offset="100%" stop-color="#125a3a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sky)"/>
  <!-- sun / warmth mark -->
  <circle cx="310" cy="80" r="34" fill="#ffe9a8" opacity="0.85"/>
  <!-- distant hills -->
  <path d="M0 190 Q 80 150 160 180 T 320 175 T 400 190 L 400 300 L 0 300 Z" fill="#6fb892" opacity="0.7"/>
  <!-- grounded foreground -->
  <path d="M0 220 Q 100 200 200 215 T 400 220 L 400 300 L 0 300 Z" fill="url(#ground)"/>
  <!-- figures (three silhouettes, loosely child-scale) -->
  <g fill="#0b3d25" opacity="0.85">
    <circle cx="130" cy="225" r="10"/>
    <path d="M120 235 Q130 230 140 235 L144 270 L116 270 Z"/>
    <circle cx="200" cy="220" r="12"/>
    <path d="M188 232 Q200 225 212 232 L216 272 L184 272 Z"/>
    <circle cx="275" cy="228" r="9"/>
    <path d="M267 238 Q275 233 283 238 L286 270 L264 270 Z"/>
  </g>
  <!-- subtle frame so the placeholder reads as "intentional" not "broken" -->
  <rect x="0.5" y="0.5" width="399" height="299" fill="none" stroke="#0f5c3a" stroke-opacity="0.15" stroke-width="1"/>
</svg>
